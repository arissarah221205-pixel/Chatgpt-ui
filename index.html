<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ChatGPT UI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">
  <header class="header">

  </footer>
</div>

<script src="script.js"></script>
</body>
</html>
